<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB Platform</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心庫 -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- 引入 Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- 引入 Lucide 圖標庫 (UMD 版本) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .page-transition { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .ios-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background: white;
            position: relative;
            overflow: hidden;
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 8px solid #1f2937;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 使用 SVG 直接定義常用圖標，避免依賴外部對象可能導致的渲染錯誤
        const Icons = {
            Bell: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path></svg>,
            Search: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            Newspaper: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2"></path><path d="M18 14h-8"></path><path d="M15 18h-5"></path><path d="M10 6h8v4h-8V6Z"></path></svg>,
            PlusCircle: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="16"></line><line x1="8" y1="12" x2="16" y2="12"></line></svg>,
            Calendar: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            ChevronRight: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"></path></svg>,
            ChevronLeft: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"></path></svg>,
            MapPin: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>,
            Ticket: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path><path d="M13 5v2"></path><path d="M13 17v2"></path><path d="M13 11v2"></path></svg>,
            X: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"></path><path d="m6 6 12 12"></path></svg>,
            Loader2: ({ className }) => <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>,
            Camera: ({ className, size }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
        };

        const App = () => {
          const [currentPage, setCurrentPage] = useState('home');
          const [selectedActivity, setSelectedActivity] = useState(null);
          const [activityImage, setActivityImage] = useState(null);
          const [isGenerating, setIsGenerating] = useState(false);
          const [showTicket, setShowTicket] = useState(false);
          
          const apiKey = ""; 

          const activities = [
            {
              id: 1,
              title: "歡迎大富翁新手賽",
              category: "桌遊",
              description: "這是一個專為初學者設計的大富翁聚會，我們會由淺入深講解規則。",
              date: "2024年10月25日",
              time: "14:00 - 17:00",
              location: "旺角彌敦道 700 號 T.O.P 4 樓",
              price: "HKD 50",
              prompt: "Diverse group of young adults playing a classic board game in a cozy cafe, high quality, 4k",
              fallbackColor: "from-red-400 to-red-600"
            },
            {
              id: 2,
              title: "Web3 商業應用講座",
              category: "講座",
              description: "探討區塊鏈技術如何改變現代商業模式。",
              date: "2024年10月28日",
              time: "19:30 - 21:00",
              location: "線上 Zoom 會議",
              price: "免費",
              prompt: "Modern professional tech seminar about blockchain and business, futuristic, digital background",
              fallbackColor: "from-blue-400 to-indigo-600"
            }
          ];

          const generateImage = async (promptText) => {
            setIsGenerating(true);
            setActivityImage(null);
            try {
              const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ instances: { prompt: promptText }, parameters: { sampleCount: 1 } })
              });
              const result = await response.json();
              if (result.predictions?.[0]) {
                setActivityImage(`data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`);
              }
            } catch (e) {
              console.error("Image generation failed", e);
            } finally {
              setIsGenerating(false);
            }
          };

          const handleActivityClick = (activity) => {
            setSelectedActivity(activity);
            setCurrentPage('details');
            setShowTicket(false);
            generateImage(activity.prompt);
          };

          const TicketModal = () => (
            <div className="absolute inset-0 z-[60] flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
              <div className="w-full max-w-[280px] bg-white rounded-[2.5rem] overflow-hidden shadow-2xl page-transition">
                <div className="bg-red-600 p-6 text-white text-center relative">
                  <button onClick={() => setShowTicket(false)} className="absolute right-4 top-4 bg-white/20 p-2 rounded-full active:scale-90 transition-transform">
                    <Icons.X />
                  </button>
                  <div className="flex justify-center mb-3">
                    <Icons.Ticket />
                  </div>
                  <h3 className="font-black text-lg">報名成功！</h3>
                </div>
                <div className="p-8 text-center space-y-4">
                  <h4 className="font-black text-gray-900 text-sm">{selectedActivity.title}</h4>
                  <div className="bg-gray-50 p-4 rounded-3xl border-2 border-dashed border-gray-200 inline-block">
                    <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="black" strokeWidth="1.5">
                        <path d="M3 3h6v6H3V3zM15 3h6v6h-6V3zM3 15h6v6H3v-6zM15 15h2v2h-2v-2zM19 15h2v2h-2v-2zM17 17h2v2h-2v-2z" />
                    </svg>
                  </div>
                  <p className="text-[10px] text-gray-400 font-black tracking-widest uppercase">ID: ORB-2024-X92F</p>
                </div>
              </div>
            </div>
          );

          const HomePage = () => (
            <div className="flex flex-col h-full bg-[#F8F9FB] page-transition">
              <header className="p-6 flex justify-between items-center bg-white shadow-sm">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-red-600 rounded-full flex items-center justify-center text-white font-black text-xs">OR</div>
                  <span className="font-black text-xl text-gray-900 italic tracking-tight">ORB</span>
                </div>
                <button className="p-2 hover:bg-gray-50 rounded-full text-gray-400">
                  <Icons.Bell />
                </button>
              </header>
              
              <div className="flex-1 overflow-y-auto p-5 space-y-6 pb-20 no-scrollbar">
                <div className="bg-gradient-to-br from-red-500 to-red-600 rounded-[2rem] p-7 text-white shadow-xl relative overflow-hidden">
                  <h2 className="text-xl font-black leading-snug max-w-[180px] relative z-10">讓運動與社交更簡單。</h2>
                  <div className="absolute -bottom-10 -right-6 w-32 h-32 bg-white/10 rounded-full blur-xl"></div>
                </div>
                
                <div className="grid grid-cols-3 gap-3">
                  <div onClick={() => setCurrentPage('search')} className="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 border border-gray-50 shadow-sm cursor-pointer active:scale-95 transition-all">
                    <div className="text-red-600"><Icons.Search /></div>
                    <span className="text-[11px] font-black text-gray-700">搜尋</span>
                  </div>
                  <div onClick={() => setCurrentPage('news')} className="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 border border-gray-50 shadow-sm cursor-pointer active:scale-95 transition-all">
                    <div className="text-red-600"><Icons.Newspaper /></div>
                    <span className="text-[11px] font-black text-gray-700">消息</span>
                  </div>
                  <div onClick={() => setCurrentPage('create')} className="bg-white rounded-2xl p-4 flex flex-col items-center gap-2 border border-gray-50 shadow-sm cursor-pointer active:scale-95 transition-all">
                    <div className="text-red-600"><Icons.PlusCircle /></div>
                    <span className="text-[11px] font-black text-gray-700">建立</span>
                  </div>
                </div>

                <div className="space-y-4">
                  <h3 className="font-black text-gray-900 text-lg">熱門活動</h3>
                  {activities.map(item => (
                    <div key={item.id} onClick={() => handleActivityClick(item)} className="bg-white rounded-2xl p-4 flex items-center justify-between border border-gray-100 shadow-sm cursor-pointer hover:border-red-200 transition-colors active:bg-gray-50">
                      <div className="flex items-center gap-4">
                        <div className="w-10 h-10 bg-red-50 rounded-xl flex items-center justify-center text-red-600">
                          <Icons.Calendar />
                        </div>
                        <div>
                          <h4 className="font-black text-gray-900 text-sm">{item.title}</h4>
                          <p className="text-[10px] font-bold text-gray-400">{item.date}</p>
                        </div>
                      </div>
                      <div className="text-gray-300"><Icons.ChevronRight /></div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          );

          const NewsPage = () => (
            <div className="flex flex-col h-full bg-white page-transition">
              <header className="px-5 pt-12 pb-4 border-b border-gray-50 flex items-center">
                <button onClick={() => setCurrentPage('home')} className="p-2 hover:bg-gray-50 rounded-full">
                    <Icons.ChevronLeft />
                </button>
                <h1 className="flex-1 text-center font-black text-lg mr-10">最新消息</h1>
              </header>
              <div className="p-6 space-y-4">
                <div className="bg-gray-50 p-6 rounded-[2rem] border border-gray-100">
                  <h3 className="font-black text-red-600 mb-2">更新通知</h3>
                  <p className="text-sm text-gray-500 font-bold leading-relaxed">我們優化了圖標渲染系統，現在 App 在不同瀏覽器上的相容性更好了。</p>
                </div>
              </div>
            </div>
          );

          const DetailsPage = () => {
            if (!selectedActivity) return null;
            return (
              <div className="flex flex-col h-full bg-white page-transition">
                <header className="bg-red-600 text-white p-6 pt-12 flex items-center sticky top-0 z-40 shadow-sm">
                  <button onClick={() => setCurrentPage('home')} className="p-1 active:scale-90 transition-transform">
                    <Icons.ChevronLeft />
                  </button>
                  <h1 className="flex-1 text-lg font-black text-center mr-6">活動詳情</h1>
                </header>
                <div className="flex-1 overflow-y-auto pb-32 no-scrollbar">
                  <div className={`h-64 flex items-center justify-center bg-gradient-to-br ${selectedActivity.fallbackColor}`}>
                    {isGenerating ? (
                        <div className="flex flex-col items-center gap-2 text-white font-bold">
                            <Icons.Loader2 className="animate-spin" />
                            <span className="text-xs">AI 生成中...</span>
                        </div>
                    ) : activityImage ? (
                        <img src={activityImage} className="w-full h-full object-cover" alt="Activity" />
                    ) : (
                        <Icons.Camera className="text-white/30" size={48} />
                    )}
                  </div>
                  <div className="p-8 space-y-6">
                    <h2 className="text-2xl font-black text-gray-900">{selectedActivity.title}</h2>
                    <p className="text-gray-500 text-sm font-bold leading-relaxed">{selectedActivity.description}</p>
                    <div className="space-y-4 border-t pt-6">
                      <div className="flex items-center gap-4 text-sm font-black text-gray-600">
                        <Icons.Calendar /> {selectedActivity.date}
                      </div>
                      <div className="flex items-center gap-4 text-sm font-black text-gray-600">
                        <Icons.MapPin /> {selectedActivity.location}
                      </div>
                    </div>
                  </div>
                </div>
                <div className="absolute bottom-0 left-0 right-0 p-6 bg-white border-t border-gray-100 flex justify-between items-center z-50 rounded-t-[2rem] shadow-2xl">
                  <div className="flex flex-col">
                    <span className="text-[10px] font-black text-gray-400 uppercase">票價</span>
                    <span className="text-2xl font-black text-red-600">{selectedActivity.price}</span>
                  </div>
                  <button onClick={() => setShowTicket(true)} className="bg-red-600 text-white px-8 py-3 rounded-2xl font-black flex items-center gap-2 active:scale-95 transition-transform shadow-lg shadow-red-200">
                    <Icons.Ticket /> 立即報名
                  </button>
                </div>
                {showTicket && <TicketModal />}
              </div>
            );
          };

          return (
            <div className="flex justify-center min-h-screen items-center p-4">
              <div className="ios-container">
                {currentPage === 'home' && <HomePage />}
                {currentPage === 'news' && <NewsPage />}
                {currentPage === 'details' && <DetailsPage />}
                
                {(currentPage === 'search' || currentPage === 'create') && (
                    <div className="flex flex-col items-center justify-center h-full p-10 text-center page-transition">
                        <div className="text-red-600 mb-4 animate-bounce"><Icons.Loader2 className="animate-spin" /></div>
                        <p className="font-black text-gray-900">功能開發中</p>
                        <p className="text-xs text-gray-400 mt-2 font-bold leading-relaxed">ORB 團隊正加緊研發搜尋與建立功能，敬請期待。</p>
                        <button onClick={() => setCurrentPage('home')} className="mt-8 bg-gray-900 text-white px-8 py-2 rounded-xl font-black text-sm active:scale-95 transition-transform">返回主頁</button>
                    </div>
                )}
                
                {/* iOS 底部橫條 */}
                <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-gray-200 rounded-full"></div>
              </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
