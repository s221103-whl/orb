<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORB - 讓興趣更簡單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .ios-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background: white;
            position: relative;
            overflow: hidden;
            border-radius: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 8px solid #1f2937;
            margin: 20px auto;
        }
        .page-transition { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input, select { -webkit-appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const Icons = {
            Bell: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"></path><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"></path></svg>,
            Message: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>,
            Plus: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Search: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
            History: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            Users: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>,
            Megaphone: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="m3 11 18-5v12L3 13v-2Z"></path><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"></path></svg>,
            Grid: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>,
            Calendar: (props) => <svg width={props.size || "18"} height={props.size || "18"} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>,
            ChevronRight: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#D1D5DB" strokeWidth="3"><path d="m9 18 6-6-6-6"></path></svg>,
            Back: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="m15 18-6-6 6-6"></path></svg>,
            MapPin: () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>,
            Ticket: () => <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 9a3 3 0 0 1 0 6v2a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-2a3 3 0 0 1 0-6V7a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path><path d="M13 5v2"></path><path d="M13 17v2"></path><path d="M13 11v2"></path></svg>,
            Info: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
            Clock: () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        };

        const App = () => {
          const [currentPage, setCurrentPage] = useState('home');
          const [selectedActivity, setSelectedActivity] = useState(null);
          const [activeCategory, setActiveCategory] = useState('全部');

          // 更新類別清單：刪除講座，加入飯腳、文化、烹飪、藝術、登山、水上活動
          const categories = ['飯腳', '文化', '烹飪', '藝術', '登山', '水上活動', '桌上遊戲', '運動', '其他'];

          const [activities, setActivities] = useState([
            { id: 1, title: "歡迎大富翁新手賽", category: "桌上遊戲", location: "旺角彌敦道 700 號 T.O.P 4 樓", date: "5月20日" },
            { id: 2, title: "中環日式拉麵飯腳團", category: "飯腳", location: "中環威靈頓街 99 號", date: "5月21日" },
            { id: 3, title: "週日匹克球初級班", category: "運動", location: "維多利亞公園網球場", date: "5月24日" },
            { id: 4, title: "法式馬卡龍基礎烹飪班", category: "烹飪", location: "荔枝角 D2 Place 二期", date: "5月25日" },
            { id: 5, title: "大東山觀日登山行", category: "登山", location: "東涌站集合", date: "5月26日" },
            { id: 6, title: "西貢獨木舟探險之旅", category: "水上活動", location: "西貢碼頭集合", date: "5月27日" },
            { id: 7, title: "大館導覽及歷史文化座談", category: "文化", location: "中環大館", date: "5月28日" },
            { id: 8, title: "週末油畫工作坊", category: "藝術", location: "火炭藝術工作室", date: "5月29日" },
            { id: 9, title: "韓式炸雞啤酒分享會", category: "飯腳", location: "尖沙咀加連威老道", date: "5月30日" }
          ]);

          const newsData = {
            offers: [
              { id: 1, title: "新會員迎新禮遇", desc: "恭喜加入！送你 $10 活動現金券", date: "剛剛" },
              { id: 2, title: "週末運動節優惠", desc: "所有運動類活動報名費 9 折", date: "2天前" }
            ],
            notifications: [
              { id: 1, title: "活動人數已滿", desc: "你建立的「中環飯腳團」人數已滿，系統已停止發佈。", type: "system", date: "1小時前" },
              { id: 2, title: "報名成功通知", desc: "你已成功報名「西貢獨木舟探險之旅」。", type: "success", date: "昨天" }
            ]
          };

          const filteredActivities = activeCategory === '全部' 
            ? activities 
            : activities.filter(act => act.category === activeCategory);

          const HomePage = () => (
            <div className="flex flex-col h-full bg-[#F8F9FB] page-transition">
              <header className="p-6 flex justify-between items-center bg-white shadow-sm">
                <div className="flex items-center gap-3">
                  <div className="w-12 h-12 bg-red-600 rounded-full flex items-center justify-center text-white font-black border-2 border-white shadow-md text-sm">JA</div>
                  <span className="font-black text-2xl text-gray-800 tracking-tight">Jay</span>
                </div>
                <div className="flex gap-4 text-gray-400">
                  <Icons.Bell />
                  <Icons.Message />
                </div>
              </header>

              <div className="flex-1 overflow-y-auto p-5 space-y-6 pb-24 no-scrollbar">
                <div className="bg-red-600 rounded-[2.5rem] p-8 text-white shadow-xl shadow-red-100 relative overflow-hidden group">
                  <div className="relative z-10 space-y-4">
                    <h2 className="text-xl font-black leading-snug max-w-[200px]">加入我們的使命，讓運動更簡單、更容易參與。</h2>
                    <button className="bg-white text-red-600 px-6 py-2.5 rounded-2xl font-black text-sm active:scale-95 transition-all shadow-lg">支援 ORB</button>
                  </div>
                  <div className="absolute -bottom-10 -right-6 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                </div>

                <div className="grid grid-cols-3 gap-3">
                  {[
                    { label: '建立活動', icon: <Icons.Plus />, bg: 'bg-white', action: () => setCurrentPage('create') },
                    { label: '搜尋活動', icon: <Icons.Search />, bg: 'bg-white', action: () => setCurrentPage('search') },
                    { label: '最新消息', icon: <Icons.Megaphone />, bg: 'bg-white', badge: true, action: () => setCurrentPage('news') },
                    { label: '朋友圈', icon: <Icons.Users />, bg: 'bg-white' },
                    { label: '我的紀錄', icon: <Icons.History />, bg: 'bg-white' },
                    { label: '查看更多', icon: <Icons.Grid />, bg: 'bg-white' },
                  ].map((item, idx) => (
                    <div key={idx} onClick={item.action} className={`${item.bg} rounded-3xl p-5 flex flex-col items-center gap-3 relative cursor-pointer border border-gray-100 shadow-sm active:bg-red-50 transition-all`}>
                      <div className="text-red-600">{item.icon}</div>
                      <span className="text-[11px] font-black text-gray-700 text-center">{item.label}</span>
                      {item.badge && <div className="absolute top-4 right-4 w-2.5 h-2.5 bg-red-600 rounded-full border-2 border-white"></div>}
                    </div>
                  ))}
                </div>

                <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                  {['活躍', '與好友', '按俱樂部'].map((tab, idx) => (
                    <button key={tab} className={`px-6 py-2 rounded-full text-xs font-black whitespace-nowrap transition-all ${idx === 0 ? 'bg-red-600 text-white shadow-md shadow-red-100' : 'bg-gray-200 text-gray-500'}`}>
                      {tab}
                    </button>
                  ))}
                </div>

                <div className="flex flex-col items-center py-10 opacity-40">
                    <div className="w-20 h-20 bg-gray-200 rounded-full mb-4 flex items-center justify-center text-red-600">
                        <Icons.Search />
                    </div>
                    <p className="font-bold text-gray-500">尋找附近的活動</p>
                    <button onClick={() => setCurrentPage('search')} className="mt-4 border-2 border-red-600 text-red-600 px-8 py-1.5 rounded-xl font-bold text-sm">探索</button>
                </div>
              </div>

              <button onClick={() => setCurrentPage('search')} className="absolute bottom-8 right-8 w-14 h-14 bg-white rounded-full shadow-2xl flex items-center justify-center text-red-600 border border-gray-100 active:scale-90 transition-all z-20">
                <Icons.Search />
              </button>
            </div>
          );

          const CreateActivityPage = () => {
            const [formData, setFormData] = useState({
                title: '',
                category: '飯腳',
                date: '',
                time: '',
                location: '',
                limit: '10'
            });

            const handleSubmit = () => {
                if (!formData.title || !formData.location || !formData.date) {
                    alert('請填寫所有必要資料！');
                    return;
                }
                const newAct = {
                    id: Date.now(),
                    title: formData.title,
                    category: formData.category,
                    location: formData.location,
                    date: formData.date
                };
                setActivities([newAct, ...activities]);
                alert('活動建立成功！');
                setCurrentPage('home');
            };

            return (
                <div className="flex flex-col h-full bg-[#F8F9FB] page-transition">
                    <header className="p-4 flex items-center justify-between bg-white border-b border-gray-50">
                        <button onClick={() => setCurrentPage('home')} className="p-2">
                            <Icons.Back />
                        </button>
                        <h1 className="text-xl font-black text-gray-900">建立活動</h1>
                        <div className="w-10"></div>
                    </header>

                    <div className="flex-1 overflow-y-auto p-6 space-y-6 no-scrollbar pb-32">
                        <div className="space-y-2">
                            <label className="text-xs font-black text-gray-400 uppercase tracking-widest ml-2">活動名稱</label>
                            <input 
                                type="text" 
                                placeholder="例如：西貢獨木舟探險" 
                                className="w-full bg-white border border-gray-100 rounded-2xl py-4 px-5 text-gray-700 font-bold focus:ring-2 focus:ring-red-100 outline-none shadow-sm"
                                value={formData.title}
                                onChange={(e) => setFormData({...formData, title: e.target.value})}
                            />
                        </div>

                        <div className="space-y-2">
                            <label className="text-xs font-black text-gray-400 uppercase tracking-widest ml-2">活動類別</label>
                            <div className="grid grid-cols-2 gap-2">
                                {categories.map(cat => (
                                    <button 
                                        key={cat}
                                        onClick={() => setFormData({...formData, category: cat})}
                                        className={`py-3 rounded-xl font-bold text-sm border transition-all ${formData.category === cat ? 'bg-red-600 text-white border-red-600' : 'bg-white text-gray-500 border-gray-100'}`}
                                    >
                                        {cat}
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="grid grid-cols-2 gap-4">
                            <div className="space-y-2">
                                <label className="text-xs font-black text-gray-400 uppercase tracking-widest ml-2">日期</label>
                                <input 
                                    type="date" 
                                    className="w-full bg-white border border-gray-100 rounded-2xl py-4 px-4 text-gray-700 font-bold focus:ring-2 focus:ring-red-100 outline-none shadow-sm"
                                    onChange={(e) => setFormData({...formData, date: e.target.value})}
                                />
                            </div>
                            <div className="space-y-2">
                                <label className="text-xs font-black text-gray-400 uppercase tracking-widest ml-2">時間</label>
                                <input 
                                    type="time" 
                                    className="w-full bg-white border border-gray-100 rounded-2xl py-4 px-4 text-gray-700 font-bold focus:ring-2 focus:ring-red-100 outline-none shadow-sm"
                                    onChange={(e) => setFormData({...formData, time: e.target.value})}
                                />
                            </div>
                        </div>

                        <div className="space-y-2">
                            <label className="text-xs font-black text-gray-400 uppercase tracking-widest ml-2">活動地址</label>
                            <div className="relative">
                                <div className="absolute top-4 left-4 text-red-500">
                                    <Icons.MapPin />
                                </div>
                                <input 
                                    type="text" 
                                    placeholder="輸入詳細地址或地點名稱" 
                                    className="w-full bg-white border border-gray-100 rounded-2xl py-4 pl-12 pr-4 text-gray-700 font-bold focus:ring-2 focus:ring-red-100 outline-none shadow-sm"
                                    value={formData.location}
                                    onChange={(e) => setFormData({...formData, location: e.target.value})}
                                />
                            </div>
                        </div>

                        <div className="space-y-2">
                            <label className="text-xs font-black text-gray-400 uppercase tracking-widest ml-2">人數上限</label>
                            <select 
                                className="w-full bg-white border border-gray-100 rounded-2xl py-4 px-5 text-gray-700 font-bold focus:ring-2 focus:ring-red-100 outline-none shadow-sm"
                                value={formData.limit}
                                onChange={(e) => setFormData({...formData, limit: e.target.value})}
                            >
                                <option value="5">5 人</option>
                                <option value="10">10 人</option>
                                <option value="20">20 人</option>
                                <option value="50">50 人</option>
                                <option value="unlimited">不限人數</option>
                            </select>
                        </div>
                    </div>

                    <div className="p-6 bg-white border-t border-gray-50 absolute bottom-0 left-0 right-0 rounded-t-[2.5rem] shadow-2xl">
                        <button 
                            onClick={handleSubmit}
                            className="w-full bg-red-600 text-white py-5 rounded-[1.5rem] font-black text-lg shadow-xl shadow-red-100 active:scale-95 transition-all"
                        >
                            確定建立活動
                        </button>
                    </div>
                </div>
            );
          };

          const NewsPage = () => (
            <div className="flex flex-col h-full bg-[#F8F9FB] page-transition">
                <header className="p-4 flex items-center justify-between bg-white border-b border-gray-50">
                    <button onClick={() => setCurrentPage('home')} className="p-2">
                        <Icons.Back />
                    </button>
                    <h1 className="text-xl font-black text-gray-900">最新消息</h1>
                    <div className="w-10"></div>
                </header>

                <div className="flex-1 overflow-y-auto p-5 space-y-8 no-scrollbar">
                    <section>
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-lg font-black text-gray-800">最新推出優惠</h2>
                        </div>
                        <div className="space-y-3">
                            {newsData.offers.map(offer => (
                                <div key={offer.id} className="bg-white rounded-3xl p-5 border border-gray-100 shadow-sm flex items-center gap-4 relative overflow-hidden">
                                    <div className="absolute top-0 right-0 w-16 h-16 bg-red-50 rounded-bl-[2.5rem] flex items-center justify-center text-red-600 translate-x-2 -translate-y-2 opacity-50">
                                        <Icons.Ticket />
                                    </div>
                                    <div className="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-white shrink-0 shadow-md">
                                        <Icons.Ticket />
                                    </div>
                                    <div className="flex-1">
                                        <h3 className="font-black text-gray-900 text-[16px]">{offer.title}</h3>
                                        <p className="text-[12px] font-medium text-gray-500">{offer.desc}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>
                </div>
            </div>
          );

          const SearchPage = () => (
            <div className="flex flex-col h-full bg-white page-transition">
                <header className="p-4 flex items-center justify-between border-b border-gray-50 sticky top-0 bg-white z-10">
                    <button onClick={() => setCurrentPage('home')} className="p-2">
                        <Icons.Back />
                    </button>
                    <h1 className="text-xl font-black text-gray-900">搜尋活動</h1>
                    <div className="w-10"></div>
                </header>

                <div className="p-5 flex-1 overflow-y-auto no-scrollbar">
                    <div className="relative mb-6">
                        <div className="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-400">
                            <Icons.Search />
                        </div>
                        <input 
                            type="text" 
                            placeholder="搜尋名稱或地點..." 
                            className="w-full bg-[#F3F4F6] border-none rounded-2xl py-4 pl-12 pr-4 text-gray-600 font-medium placeholder-gray-400 focus:ring-2 focus:ring-red-100 outline-none transition-all shadow-sm"
                        />
                    </div>

                    <div className="flex gap-2 overflow-x-auto pb-6 no-scrollbar">
                        {['全部', ...categories].map((cat) => (
                            <button 
                                key={cat} 
                                onClick={() => setActiveCategory(cat)}
                                className={`px-5 py-2.5 rounded-2xl text-[13px] font-black whitespace-nowrap transition-all border ${activeCategory === cat ? 'bg-red-600 text-white border-red-600 shadow-md shadow-red-100' : 'bg-white text-gray-400 border-gray-100'}`}
                            >
                                {cat}
                            </button>
                        ))}
                    </div>

                    <div className="space-y-4 pb-10">
                        {filteredActivities.length > 0 ? filteredActivities.map(act => (
                            <div key={act.id} onClick={() => { setSelectedActivity(act); setCurrentPage('details'); }} className="bg-white rounded-3xl p-5 border border-gray-100 shadow-sm flex items-center gap-4 active:scale-[0.98] transition-transform cursor-pointer">
                                <div className="w-16 h-16 bg-red-50 rounded-2xl flex items-center justify-center text-red-500 shrink-0">
                                    <Icons.Calendar size="28" />
                                </div>
                                <div className="flex-1 overflow-hidden">
                                    <div className="flex justify-between items-start mb-1">
                                        <h3 className="font-black text-gray-900 text-[17px] truncate pr-2">{act.title}</h3>
                                        <span className="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-md font-bold shrink-0">{act.category}</span>
                                    </div>
                                    <div className="flex items-start gap-1 text-gray-400">
                                        <div className="mt-0.5 shrink-0"><Icons.MapPin /></div>
                                        <p className="text-[12px] font-medium leading-tight truncate">{act.location}</p>
                                    </div>
                                </div>
                                <div className="shrink-0">
                                    <Icons.ChevronRight />
                                </div>
                            </div>
                        )) : (
                            <div className="py-20 text-center text-gray-300 font-bold">
                                暫無相關活動
                            </div>
                        )}
                    </div>
                </div>
            </div>
          );

          const DetailsPage = () => (
            <div className="flex flex-col h-full bg-white page-transition">
              <header className="bg-red-600 text-white p-6 pt-12 flex items-center sticky top-0 z-40 shadow-sm">
                <button onClick={() => setCurrentPage('search')} className="p-1 active:scale-90 transition-transform">
                  <Icons.Back />
                </button>
                <h1 className="flex-1 text-lg font-black text-center mr-6 tracking-tight">活動介紹</h1>
              </header>
              <div className="flex-1 overflow-y-auto pb-32 no-scrollbar">
                <div className="h-64 bg-red-50 flex items-center justify-center relative">
                   <div className="flex flex-col items-center gap-4 text-red-200">
                      <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path><circle cx="12" cy="13" r="3"></circle></svg>
                      <span className="font-black text-2xl tracking-tighter italic">ORB ACTIVITY</span>
                   </div>
                </div>
                <div className="p-8 space-y-6">
                  <div className="flex justify-between items-center">
                    <span className="text-red-600 text-xs font-black px-3 py-1 bg-red-50 rounded-full uppercase tracking-wider">{selectedActivity.category}</span>
                  </div>
                  <h2 className="text-2xl font-black text-gray-900 leading-tight">{selectedActivity.title}</h2>
                  <p className="text-gray-500 text-sm font-bold leading-relaxed">
                    加入我們的 {selectedActivity.title}，這是一個非常受歡迎的{selectedActivity.category}活動。適合所有程度的朋友參加，我們致力於營造輕鬆愉快的社群氛圍。
                  </p>
                  <div className="space-y-4 border-t pt-6">
                    <div className="flex items-center gap-4 text-sm font-black text-gray-600"><Icons.Calendar /> {selectedActivity.date}</div>
                    <div className="flex items-center gap-4 text-sm font-black text-gray-600"><Icons.Clock /> 19:00 - 21:00</div>
                    <div className="flex items-start gap-4 text-sm font-black text-gray-600"><div className="mt-1"><Icons.MapPin /></div> {selectedActivity.location}</div>
                  </div>
                </div>
              </div>
              <div className="absolute bottom-0 left-0 right-0 p-6 bg-white border-t border-gray-100 flex justify-between items-center z-50 shadow-2xl rounded-t-[2.5rem]">
                <span className="text-2xl font-black text-red-600">免費</span>
                <button onClick={() => alert('報名成功！')} className="bg-red-600 text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-red-200 active:scale-95 transition-all">立即報名</button>
              </div>
            </div>
          );

          return (
            <div className="ios-container">
              {currentPage === 'home' && <HomePage />}
              {currentPage === 'search' && <SearchPage />}
              {currentPage === 'details' && <DetailsPage />}
              {currentPage === 'news' && <NewsPage />}
              {currentPage === 'create' && <CreateActivityPage />}
              
              <div className="absolute bottom-2 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-gray-200 rounded-full z-50"></div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
